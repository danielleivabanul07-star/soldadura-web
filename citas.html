<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Cita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="citas">
    <h1>Agendar Cita</h1>
    <p>Elige el servicio, fecha y hora. Si el horario está ocupado, el sistema buscará otra opción disponible.</p>

    <form id="formCita">
      <input type="text" id="nombre" placeholder="Nombre completo" required>
      <input type="tel" id="telefono" placeholder="Número de teléfono" required>

      <select id="servicio" required>
        <option value="">Selecciona un servicio</option>
        <option value="Soldadura automotriz">Soldadura automotriz</option>
        <option value="Reparación de escape">Reparación de escape</option>
        <option value="Modificación de escape">Modificación de escape</option>
        <option value="Reparación de metal">Reparación de metal</option>
        <option value="Proyecto metálico personalizado">Proyecto metálico personalizado</option>
      </select>

      <input type="date" id="fecha" required>
      <select id="hora" required>
  <option value="">Selecciona una hora</option>
  <option value="08:00">8:00 AM</option>
  <option value="09:00">9:00 AM</option>
  <option value="10:00">10:00 AM</option>
  <option value="11:00">11:00 AM</option>
  <option value="13:00">1:00 PM</option>
  <option value="14:00">2:00 PM</option>
  <option value="15:00">3:00 PM</option>
  <option value="16:00">4:00 PM</option>
</select>

      <textarea id="mensaje" placeholder="Describe brevemente el trabajo" required></textarea>

      <p id="avisoHorario"></p>

      <button type="submit">Enviar cita por WhatsApp</button>
    </form>
  </section>

  <script>
    const telefonoWhatsApp = "16892220829";

    const horariosOcupados = {};

   const horariosDisponibles = [
  "08:00",
  "09:00",
  "10:00",
  "11:00",
  "13:00",
  "14:00",
  "15:00",
  "16:00"
];

    function buscarProximoHorario(fecha, horaSeleccionada) {
      const ocupados = horariosOcupados[fecha] || [];

      for (let i = 0; i < horariosDisponibles.length; i++) {
        const hora = horariosDisponibles[i];

        if (hora > horaSeleccionada && !ocupados.includes(hora)) {
          return hora;
        }
      }

      for (let i = 0; i < horariosDisponibles.length; i++) {
        const hora = horariosDisponibles[i];

        if (!ocupados.includes(hora)) {
          return hora;
        }
      }

      return null;
    }

    document.getElementById("formCita").addEventListener("submit", function(e) {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value;
      const telefono = document.getElementById("telefono").value;
      const servicio = document.getElementById("servicio").value;
      const fecha = document.getElementById("fecha").value;
      let hora = document.getElementById("hora").value;
      const mensaje = document.getElementById("mensaje").value;
      const aviso = document.getElementById("avisoHorario");

      const ocupados = horariosOcupados[fecha] || [];

      if (ocupados.includes(hora)) {
        const nuevaHora = buscarProximoHorario(fecha, hora);

        if (nuevaHora) {
          aviso.innerText = "Ese horario está ocupado. Se cambió automáticamente para las " + nuevaHora;
          hora = nuevaHora;
        } else {
          aviso.innerText = "No hay horarios disponibles para ese día. Elige otra fecha.";
          return;
        }
      }

      const texto =
        "Hola, quiero agendar una cita:%0A%0A" +
        "Nombre: " + nombre + "%0A" +
        "Teléfono: " + telefono + "%0A" +
        "Servicio: " + servicio + "%0A" +
        "Fecha: " + fecha + "%0A" +
        "Hora: " + hora + "%0A" +
        "Detalle: " + mensaje;

      window.open("https://wa.me/" + telefonoWhatsApp + "?text=" + texto, "_blank");
    });
  </script>

</body>
</html>
