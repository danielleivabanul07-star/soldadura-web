<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Cita - DLB Welding & Auto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="page-nav">
  <div class="logo">DLB Welding & Auto</div>
  <div class="menu">
    <a href="index.html">Inicio</a>
    <a href="servicios.html">Servicios</a>
    <a href="galeria.html">Galería</a>
    <a href="contacto.html">Contacto</a>
  </div>
</nav>

<section class="page-section">
  <h1>Agenda tu Cita</h1>
  <p>Llena tus datos y se abrirá WhatsApp con la solicitud lista para enviar.</p>

  <form onsubmit="enviarWhatsApp(event)">
    <input type="text" id="nombre" placeholder="Tu nombre completo" required>
    <input type="tel" id="telefonoCliente" placeholder="Tu número de teléfono" required>

    <select id="servicio" required>
      <option value="">Selecciona el servicio</option>
      <option value="Soldadura de escapes">Soldadura de escapes</option>
      <option value="Reparación de chasis">Reparación de chasis</option>
      <option value="Fabricación metálica">Fabricación metálica</option>
      <option value="Cambio de suspensión">Cambio de suspensión</option>
      <option value="Cambio de parrillas">Cambio de parrillas</option>
      <option value="Frenos">Frenos</option>
      <option value="Cambio de aceite">Cambio de aceite</option>
      <option value="Otro servicio">Otro servicio</option>
    </select>

    <input type="date" id="fecha" required>
    <input type="time" id="hora" required>

    <textarea id="mensaje" placeholder="Describe el trabajo que necesitas" required></textarea>

    <button type="submit">Enviar solicitud por WhatsApp</button>
  </form>

  <a href="index.html" class="back-home">Volver al inicio</a>
</section>

<script src="script.js"></script>
</body>
</html>
